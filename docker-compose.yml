services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: apistudio
      POSTGRES_PASSWORD: apistudio
      POSTGRES_DB: apistudio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apistudio"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://apistudio:apistudio@postgres:5432/apistudio
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-change-in-production
      CORS_ORIGINS: '["http://localhost","http://localhost:80","http://localhost:5173"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
